# data/ant_running.yaml
data_name: ant_running

# PT episodes generated by Ant/generate_ant_data.py
data_dir: ./Trajworld_data/UniTraj_pt/ant_running_pt/ant_running

# Use a dedicated H5 cache so existing pretraining chunks are not reused.
h5_dir: ./dataset_h5_ant_running
test_h5_dir: ./dataset_h5_ant_running

chunk_size: 5000
MAX_ACTION_DIM: 8
MAX_OBS_DIM: 31

# Segment length. Ant episodes are at most 500 steps; 150 matches the default
# WestWorld training window.
data_length: 150

# Ant Running task id.
filter_task_ids: [131]
test_task_ids: [131]
