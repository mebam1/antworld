services:
  westworld:
    build:
      context: .
      args:
        ENV_NAME: westworld
        WESTWORLD_EXTERNAL_ROOT: /opt/westworld-external
    image: westworld:dev
    working_dir: /workspace/WestWorld
    shm_size: "16gb"
    stdin_open: true
    tty: true
    gpus: all
    environment:
      WANDB_MODE: ${WANDB_MODE:-offline}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      PYTHONPATH: /workspace/WestWorld
      PYTHONUNBUFFERED: "1"
    volumes:
      - type: bind
        source: .
        target: /workspace/WestWorld
    command: bash
