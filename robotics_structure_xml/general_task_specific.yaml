      - [v_lin, 0, root]    # base_vx -> 26
      - [v_lin, 0, root]    # base_vy -> 27
      - [v_lin, 0, root]    # base_vz -> 28

      # -- qvel: joint velocities (jointorderconsistent; velocity0) --
      - [v_jnt, 0, left_hip]            # 29 (= 23 + 6)
      - [v_jnt, 0, right_hip]           # 30
      - [v_jnt, 0, left_pelvis_rotation]             # 31
      - [v_jnt, 0, right_pelvis_rotation]            # 32

      - [v_jnt, 0, left_thigh]           # 33
      - [v_jnt, 0, right_thigh]          # 34
      - [v_jnt, 0, left_knee]                # 35
      - [v_jnt, 0, right_knee]               # 36
      - [v_jnt, 0, left_shin]          # 37
      - [v_jnt, 0, right_shin]         # 38
      - [v_jnt, 0, left_tarsus]         # 39
      - [v_jnt, 0, right_tarsus]        # 40
      - [v_jnt, 0, left_toe]  
      - [v_jnt, 0, left_toe]               
      - [v_jnt, 0, right_toe] 
      - [v_jnt, 0, right_toe]
  128:
    robotics_type: go1_mppi
    xml: robotics_structure_xml/go1_mppi.xml

    # ========== action(12)==========
    # order <actuator> motor orderconsistent(joint)
    actions:
      - [torque, 0, FR_hip]     # 0 -> FR_hip_joint
      - [torque, 0, FR_thigh]   # 1 -> FR_thigh_joint
      - [torque, 0, FR_calf]    # 2 -> FR_calf_joint
      - [torque, 0, FL_hip]     # 3 -> FL_hip_joint
      - [torque, 0, FL_thigh]   # 4 -> FL_thigh_joint
      - [torque, 0, FL_calf]    # 5 -> FL_calf_joint
      - [torque, 0, RR_hip]     # 6 -> RR_hip_joint
      - [torque, 0, RR_thigh]   # 7 -> RR_thigh_joint
      - [torque, 0, RR_calf]    # 8 -> RR_calf_joint
      - [torque, 0, RL_hip]     # 9 -> RL_hip_joint
      - [torque, 0, RL_thigh]   # 10 -> RL_thigh_joint
      - [torque, 0, RL_calf]    # 11 -> RL_calf_joint

    # ========== observation(37)==========
    # qpos[0:7] = base: 3 position + 4 (w,x,y,z); qpos[7:19] = 12 joint angle
    # qvel[0:6] = base: 3 linear velocity + 3 angular velocity; qvel[6:18] = 12 joint angular velocity
    observations:
      # -- base position(3)--
      - [pos_lin, 0, trunk]   # x
      - [pos_lin, 1, trunk]   # y
      - [pos_lin, 2, trunk]   # z

      # -- base (4, w x y z)--
      - [quat, 0, trunk]      # w
      - [quat, 1, trunk]      # x
      - [quat, 2, trunk]      # y
      - [quat, 3, trunk]      # z

      # -- 12x joint angle(/order)--
      - [pos_ang, 0, FR_hip]
      - [pos_ang, 0, FR_thigh]
      - [pos_ang, 0, FR_calf]
      - [pos_ang, 0, FL_hip]
      - [pos_ang, 0, FL_thigh]
      - [pos_ang, 0, FL_calf]
      - [pos_ang, 0, RR_hip]
      - [pos_ang, 0, RR_thigh]
      - [pos_ang, 0, RR_calf]
      - [pos_ang, 0, RL_hip]
      - [pos_ang, 0, RL_thigh]
      - [pos_ang, 0, RL_calf]

      # -- base linear velocity(3)--
      - [v_lin, 0, trunk]     # vx
      - [v_lin, 0, trunk]     # vy
      - [v_lin, 0, trunk]     # vz

      # -- base angular velocity(3)--
      - [v_ang, 0, trunk]     # wx
      - [v_ang, 0, trunk]     # wy
      - [v_ang, 0, trunk]     # wz

      # -- 12x joint angular velocity(joint angleorderconsistent)--
      - [v_jnt, 0, FR_hip]
      - [v_jnt, 0, FR_thigh]
      - [v_jnt, 0, FR_calf]
      - [v_jnt, 0, FL_hip]
      - [v_jnt, 0, FL_thigh]
      - [v_jnt, 0, FL_calf]
      - [v_jnt, 0, RR_hip]
      - [v_jnt, 0, RR_thigh]
      - [v_jnt, 0, RR_calf]
      - [v_jnt, 0, RL_hip]
      - [v_jnt, 0, RL_thigh]
      - [v_jnt, 0, RL_calf]
