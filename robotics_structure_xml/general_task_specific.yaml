      - [pos_lin, 1, ball]   # ball.x   (ball x-axis position, m)
      - [pos_lin, 1, ball]   # ball.z   (ball z-axis position, m)

      # -- velocity (4) -------------------
      - [v_lin,  0, cup ]    # cup.ẋ    (cup x-axis velocity, m/s)
      - [v_lin,  0, cup ]    # cup.ż    (cup z-axis velocity, m/s)
      - [v_lin,  1, ball]    # ball.ẋ   (ball x-axis velocity, m/s)
      - [v_lin,  1, ball]    # ball.ż   (ball z-axis velocity, m/s)
