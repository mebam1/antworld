  75:
    robotics_type: manipulator
    xml: robotics_structure_xml/manipulator.xml

    # action (5): XML 5 motor
    # [ act_type, obj_id, body_name ]
    actions:
      - [torque, 0, upper_arm ]   # motor "root" -> joint arm_root
      - [torque, 0, middle_arm]   # motor "shoulder" -> joint arm_shoulder
      - [torque, 0, lower_arm ]   # motor "elbow" -> joint arm_elbow
      - [torque, 0, hand      ]   # motor "wrist" -> joint arm_wrist
      - [torque, 0, hand      ]   # motor "grasp" -> tendon grasp (thumb+finger)

    # observation (44): arm_pos(8x2) + arm_vel(8) + touch(5) + hand_pos(4) + object_pos(4) + object_vel(3) + target_pos(4)
    # [ obs_type , obj_id , body/site name ]
    observations:
      # -- arm_pos (8x2: sin/cos) ----------------
      - [sin, 0, upper_arm ]     # arm_root
      - [cos, 0, upper_arm ]
      - [sin, 0, middle_arm]     # arm_shoulder
      - [cos, 0, middle_arm]
      - [sin, 0, lower_arm ]     # arm_elbow
      - [cos, 0, lower_arm ]
      - [sin, 0, hand      ]     # arm_wrist
      - [cos, 0, hand      ]
      - [sin, 0, thumb     ]     # thumb
      - [cos, 0, thumb     ]
      - [sin, 0, thumbtip  ]     # thumbtip
      - [cos, 0, thumbtip  ]
      - [sin, 0, finger    ]     # finger
      - [cos, 0, finger    ]
      - [sin, 0, fingertip ]     # fingertip
      - [cos, 0, fingertip ]

      # -- arm_vel (8) --------------------
      - [v_jnt, 0, upper_arm ]   # arm_rooṫ
      - [v_jnt, 0, middle_arm]   # arm_shouldeṙ
      - [v_jnt, 0, lower_arm ]   # arm_elboẇ
      - [v_jnt, 0, hand      ]   # arm_wrisṫ
      - [v_jnt, 0, thumb     ]   # thumḃ
      - [v_jnt, 0, thumbtip  ]   # thumbtiṗ
      - [v_jnt, 0, finger    ]   # fingeṙ
      - [v_jnt, 0, fingertip ]   # fingertiṗ

      # --- touch (5): hand touch sites ----------------------------------------
      - [touch, 0, hand    ]
      - [touch, 0, finger  ]
      - [touch, 0, thumb   ]
      - [touch, 0, fingertip]
      - [touch, 0, thumbtip]

      # --- hand_pos (4): approximate gripper-end pose -------------------------------------
      # Uses the world coordinates of the "pinch site" (x,y,z) + the wrist joint angle (approximating hand orientation)
      - [pos_lin, 0, pinch_site ]     # x
      - [pos_lin, 0, pinch_site ]     # y
      - [pos_lin, 0, pinch_site ]     # z
      - [pos_ang, 0, hand  ]     # arm_wrist angle

      # --- object_pos (4): approximate ball pose -------------------------------------
      # Uses the ball site position (x,y,z) + the joint angle about the y-axis (ball_y)
      - [pos_lin, 2, ball  ]     # x
      - [pos_lin, 2, ball  ]     # y
      - [pos_lin, 2, ball  ]     # z
      - [pos_ang, 2, ball  ]     # ball_y

      # --- object_vel (3): velocity of the ball in 3 DoFs -------------------------------
      # ball_x and ball_z are slide joints; ball_y is a hinge joint
      - [v_jnt, 2, ball ]        # ball_ẋ
      - [v_jnt, 2, ball ]        # ball_ẏ
      - [v_jnt, 2, ball ]        # ball_ż

      # --- target_pos (4): target basket position / contour feature -------------------------------
      # Uses the ghost target-ball site (target_ball) position (x,y,z) + the z of the nearest point on the cup rim (approximated by the cup site z)
      - [pos_lin, 3, target_ball]  # x
      - [pos_lin, 3, target_ball]  # y
      - [pos_lin, 3, target_ball]  # z
      - [pos_lin, 1, cup        ]  # Used as the 4th geometric auxiliary dimension (keeping 44 dims stable)
  76:
    robotics_type: reacher
    xml: robotics_structure_xml/reacher.xml

    # Actions (2) -- in <actuator> order; triplet: [act_type, obj_id, body_name]
    actions:
      - [torque, 0, body0]    # joint0 is on body0; shoulder joint torque τ0 ∈ [-1,1]
      - [torque, 0, body1]    # joint1 is on body1; elbow joint torque τ1 ∈ [-1,1]

    # Observations (6) -- aligned with DMC/EnvPool position(2), to_target(2), velocity(2)
    observations:
      # Joint angles (rad)
      - [pos_ang, 0, body0]   # θ1 (joint0 angle)
      - [pos_ang, 0, body1]   # θ2 (joint1 angle)

      # Relative fingertip-to-target displacement (m): Δ = target - fingertip; planar x and y channels
      # These channels are attached to the obj_id=1 'target' node; the environment computes them from target and fingertip
      - [pos_lin, 1, target]  # Δx = target.x - fingertip.x
      - [pos_lin, 1, target]  # Δy = target.y - fingertip.y

      # Joint angular velocities (rad/s)
      - [v_jnt,  0, body0]    # θ̇1
      - [v_jnt,  0, body1]    # θ̇2
