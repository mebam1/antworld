  129:
    robotics_type: hopper_gym
    xml: robotics_structure_xml/hopper_gym.xml

    # Action space (3), [-1, 1], XML (order)
    actions:
      - [torque, 0, thigh]   # thighjoint
      - [torque, 0, leg]     # shinjoint
      - [torque, 0, foot]    # anklejoint

    # Observation space (12): qpos[0:] 6 + qvel 6, change to 12-dim by adding root x pos
    # Gym Hopper documentation Observation (x position).:contentReference[oaicite:1]{index=1}
    observations:
      # -- from qpos[0:]: 6 / qpos, --
      - [rootx , 0, torso]   # root x
      - [height ,  0, torso]         # height(z), from slide joint rootz
      - [pos_ang, 0, torso]          # pitch angle(torso), from hinge joint rooty
      - [pos_ang, 0, thigh]    # thighjoint angle
      - [pos_ang, 0, leg]      # shinjoint angle
      - [pos_ang, 0, foot]     # anklejoint angle

      # -- from qvel: 6 --
      - [v_lin,  0, torso]           # torso x linear velocity(rootx slide jointvelocity)
      - [v_lin,  0, torso]           # torso z linear velocity
      - [v_ang,  0, torso]           # torso y angular velocity
      - [v_jnt,  0, thigh]     # thighjoint angular velocity
      - [v_jnt,  0, leg]       # shinjoint angular velocity
      - [v_jnt,  0, foot]      # anklejoint angular velocity
  130:
    robotics_type: walker2d
    xml: robotics_structure_xml/walker2d.xml

    # Action space: 6 dims, [-1, 1](torque, XML actuator order)
    # : Gymnasium Walker2D Action space Box(-1, 1, (6,))
    actions:
      - [torque, 0, thigh]            # -> thigh_joint
      - [torque, 0, leg]              # -> leg_joint
      - [torque, 0, foot]             # -> foot_joint
      - [torque, 0, thigh_left]       # -> thigh_left_joint
      - [torque, 0, leg_left]         # -> leg_left_joint
      - [torque, 0, foot_left]        # -> foot_left_joint

    # Observation space: 18 dims
    # : 8 dims = qpos[0:](include rootx), 9 dims = qvel
    # consistent(rootz, rooty + 6; and rootx/rootz/rooty velocity + 6 joint angular velocities)
    observations:
      # -- qpos[0:] 8 --
      - [pos_lin, 0, torso]           # rootx: torso x position(slide x)
      - [pos_lin, 0, torso]           # rootz: torsoheight(slide z)
      - [pos_ang, 0, torso]           # rooty: torso pitch(hinge)
      - [pos_jnt, 0, thigh]           # thigh_joint
      - [pos_jnt, 0, leg]             # leg_joint
      - [pos_jnt, 0, foot]            # foot_joint
      - [pos_jnt, 0, thigh_left]      # thigh_left_joint
      - [pos_jnt, 0, leg_left]        # leg_left_joint
      - [pos_jnt, 0, foot_left]       # foot_left_joint

      # -- qvel 9 --
      - [v_lin,  0, torso]            # rootx : torso x linear velocity
      - [v_lin,  0, torso]            # rootz : torso z linear velocity
      - [v_ang,  0, torso]            # rooty : torsoangular velocity
      - [v_jnt,  0, thigh]            # thigh_joint angular velocity
      - [v_jnt,  0, leg]              # leg_joint angular velocity
      - [v_jnt,  0, foot]             # foot_joint angular velocity
      - [v_jnt,  0, thigh_left]       # thigh_left_joint angular velocity
      - [v_jnt,  0, leg_left]         # leg_left_joint angular velocity
      - [v_jnt,  0, foot_left]        # foot_left_joint angular velocity
  131:
    robotics_type: ant
    xml: robotics_structure_xml/ant.xml

    # Ant Running: 8D joint-space torque for the non-base revolute joints.
    # Action order follows the actuator order in robotics_structure_xml/ant.xml.
    actions:
      - [torque, 0, right_back_leg]   # hip_4
      - [torque, 0, ankle_4]          # ankle_4
      - [torque, 0, front_left_leg]   # hip_1
      - [torque, 0, ankle_1]          # ankle_1
      - [torque, 0, front_right_leg]  # hip_2
      - [torque, 0, ankle_2]          # ankle_2
      - [torque, 0, back_leg]         # hip_3
      - [torque, 0, ankle_3]          # ankle_3

    # Observation space: 29 dims.
    # [height(1), base quaternion(4), base linear velocity(3),
    #  base angular velocity(3), joint positions(8), joint velocities(8),
    #  up and heading projections(2)]
    observations:
      - [height, 0, torso]            # h

      - [quat, 0, torso]              # base quaternion w
      - [quat, 0, torso]              # base quaternion x
      - [quat, 0, torso]              # base quaternion y
      - [quat, 0, torso]              # base quaternion z

      - [v_lin, 0, torso]             # vx
      - [v_lin, 0, torso]             # vy
      - [v_lin, 0, torso]             # vz

      - [v_ang, 0, torso]             # wx
      - [v_ang, 0, torso]             # wy
      - [v_ang, 0, torso]             # wz

      - [pos_jnt, 0, right_back_leg]  # hip_4
      - [pos_jnt, 0, ankle_4]         # ankle_4
      - [pos_jnt, 0, front_left_leg]  # hip_1
      - [pos_jnt, 0, ankle_1]         # ankle_1
      - [pos_jnt, 0, front_right_leg] # hip_2
      - [pos_jnt, 0, ankle_2]         # ankle_2
      - [pos_jnt, 0, back_leg]        # hip_3
      - [pos_jnt, 0, ankle_3]         # ankle_3

      - [v_jnt, 0, right_back_leg]    # hip_4 velocity
      - [v_jnt, 0, ankle_4]           # ankle_4 velocity
      - [v_jnt, 0, front_left_leg]    # hip_1 velocity
      - [v_jnt, 0, ankle_1]           # ankle_1 velocity
      - [v_jnt, 0, front_right_leg]   # hip_2 velocity
      - [v_jnt, 0, ankle_2]           # ankle_2 velocity
      - [v_jnt, 0, back_leg]          # hip_3 velocity
      - [v_jnt, 0, ankle_3]           # ankle_3 velocity

      - [upright, 0, torso]           # p_up
      - [heading, 0, torso]           # p_heading
