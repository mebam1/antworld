# ============================================================================
# Task entry: 12) ball-in-cup (BallInCupCatch-v1)
#   • obj_id 0: cup (root=cup; including slide joints cup_x (x-axis) and cup_z (z-axis); both motors belong to this object)
#   • obj_id 1: ball (root=ball; connected by a spatial tendon; it has ball_x/ball_z slide joints itself, but no actuator)
#   • 2 action dims; 8 observation dims (4 positions: cup.x, cup.z, ball.x, ball.z; 4 velocities: corresponding ẋ and ż)
#   • Runtime parameters: frame_skip=1, max_episode_steps=1000 (DMC/EnvPool convention)
# ============================================================================
  12:
    robotics_type: ball_in_cup
    xml: robotics_structure_xml/ball_in_cup.xml

    # Action channels (2) -- two-DoF sliding of the cup in the plane (x / z)
    # [ act_type, obj_id, body_name ]
    # Note: the global act_types only defines torque=0, reused here as the unified force/torque channel;
    #       The <motor> actually drives slide joints (linear force), with range [-1, 1].
    actions:
      - [torque, 0, cup]    # motor @ joint "cup_x"  (linear drive along the x-axis, ctrlrange [-1,1])
      - [torque, 0, cup]    # motor @ joint "cup_z"  (linear drive along the z-axis, ctrlrange [-1,1])

    # Observation channels (8) -- position(4) + velocity(4) (public DMC/EnvPool spec)
    # [ obs_type, obj_id, body_name ]
    observations:
      # -- position (4) -------------------
      - [pos_lin, 0, cup ]   # cup.x    (cup x-axis slider position, m)
      - [pos_lin, 0, cup ]   # cup.z    (cup z-axis slider position, m)
      - [pos_lin, 1, ball]   # ball.x   (ball x-axis position, m)
      - [pos_lin, 1, ball]   # ball.z   (ball z-axis position, m)

      # -- velocity (4) -------------------
      - [v_lin,  0, cup ]    # cup.ẋ    (cup x-axis velocity, m/s)
      - [v_lin,  0, cup ]    # cup.ż    (cup z-axis velocity, m/s)
      - [v_lin,  1, ball]    # ball.ẋ   (ball x-axis velocity, m/s)
      - [v_lin,  1, ball]    # ball.ż   (ball z-axis velocity, m/s)
# ============================================================================
# Task entry: 13) finger-spin
#   • obj_id 0: finger (root=proximal; including distal; two motors: proximal / distal)
#   • obj_id 1: spinner (root=spinner; only its hinge angle and angular velocity are observed; no actuator)
#   • 2 action dims; 9 observation dims (position(4) + velocity(3) + target_position(2))
# ============================================================================
  13:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    # Action channels (2) -- hinge torques for the two finger segments ([-1, 1])
    # [ act_type, obj_id, body_name ]
    actions:
      - [torque, 0, proximal]      # motor @ joint "proximal"
      - [torque, 0, distal]        # motor @ joint "distal"

    # Observation channels (9) -- position(4) + velocity(3) + target_position(2)
    # [ obs_type, obj_id, body_name ]
    observations:
      # -- position(4) --------------------
      - [pos_ang, 0, proximal]     # finger proximal angle (rad)
      - [pos_ang, 0, distal  ]     # finger distal angle (rad)
      - [sin,     1, spinner ]     # sin(θ_hinge) of spinner
      - [cos,     1, spinner ]     # cos(θ_hinge) of spinner
      # -- velocity(3) --------------------
      - [v_jnt,   0, proximal]     # θ̇_proximal
      - [v_jnt,   0, distal  ]     # θ̇_distal
      - [v_jnt,   1, spinner ]     # θ̇_hinge
      # --- target_position(2) (target point in the world frame) -----------------------------------
      - [pos_lin, 1, target  ]     # target.x
      - [pos_lin, 1, target  ]     # target.z

# ============================================================================
# Task entry: 14) finger-turn-easy
#   • obj_id 0: finger; obj_id 1: spinner
#   • 2 action dims; 12 observation dims (position(4) + velocity(3) + touch(2) + target_position(2) + dist_to_target(1))
#   • The only difference from hard: the target is larger/easier (reward and difficulty differ), with the same channels
# ============================================================================
  14:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    actions:
      - [torque, 0, proximal]
      - [torque, 0, distal]

    observations:
      # -- position(4) --------------------
      - [pos_ang, 0, proximal]
      - [pos_ang, 0, distal  ]
      - [sin,     1, spinner ]     # sin(θ_hinge)
      - [cos,     1, spinner ]     # cos(θ_hinge)
      # -- velocity(3) --------------------
      - [v_jnt,   0, proximal]
      - [v_jnt,   0, distal  ]
      - [v_jnt,   1, spinner ]
      # --- touch(2): finger touch ----------------------------------------------------
      - [touch,   0, touchtop   ]  # touch sensor @ site "touchtop"
      - [touch,   0, touchbottom]  # touch sensor @ site "touchbottom"
      # -- target_position(2) ------------------
      - [pos_lin, 1, target ]      # target.x
      - [pos_lin, 1, target ]      # target.z
      # -- dist_to_target(1) ------------------
      - [dist,    1, target ]      # ‖ tip(site 'tip') - target ‖

# ============================================================================
# Task entry: 15) finger-turn-hard
#   • Channels are exactly the same as finger-turn-easy (12-D observations, 2-D actions)
#   • Higher difficulty (smaller/stricter target), used for more challenging tracking/alignment tasks
# ============================================================================
  15:
    robotics_type: finger_turn_bodies
    xml: robotics_structure_xml/finger_turn_bodies.xml

    actions:
      - [torque, 0, proximal]
      - [torque, 0, distal]

    observations:
      # -- position(4) --------------------
      - [pos_ang, 0, proximal]
      - [pos_ang, 0, distal  ]
      - [sin,     1, spinner ]
      - [cos,     1, spinner ]
      # -- velocity(3) --------------------
      - [v_jnt,   0, proximal]
      - [v_jnt,   0, distal  ]
      - [v_jnt,   1, spinner ]
      # -- touch(2) ---------------------
      - [touch,   0, touchtop   ]
      - [touch,   0, touchbottom]
      # -- target_position(2) ------------------
      - [pos_lin, 1, target ]
      - [pos_lin, 1, target ]
      # -- dist_to_target(1) ------------------
      - [dist,    1, target ]
# ============================================================================
# Task entry: 16) fish-swim
#   • obj_id 0: fish body (root=torso; including tail1/tail2 and left/right fins finleft/finright)
#   • obj_id 1: target ball (root=target; no actuator; only FishSwim exposes target(3) observations)
#   • 5 action dims; 24 observation dims = joint_angles(7) + upright(1) + target(3) + velocity(13)
#   • Runtime parameters (informational): frame_skip=10, max_episode_steps=1000
#   • Note: the 5 actuators in this XML use position/tendon control; act_types.torque is reused here as a unified channel
#           to represent applied joint/tendon inputs, consistent with previous tasks.
# ============================================================================
  16:
    robotics_type: fish_swim
    xml: robotics_structure_xml/fish_swim.xml

    # Action channels (5) -- corresponding to the 5 control channels in the XML
    # [ act_type, obj_id, body_name ]
    actions:
      - [torque, 0, tail1      ]   # position actuator @ joint "tail1"
      - [torque, 0, tail1      ]   # position actuator @ joint "tail_twist"
      - [torque, 0, torso      ]   # position actuator @ tendon "fins_flap" (across the left and right fins)
      - [torque, 0, finleft    ]   # position actuator @ joint "finleft_pitch"
      - [torque, 0, finright   ]   # position actuator @ joint "finright_pitch"

    # Observation channels (24) -- joint_angles(7) + upright(1) + target(3) + velocity(13)
    # [ obs_type, obj_id, body_name ]
    observations:
      # -- joint_angles (7) ------------------
      - [pos_ang, 0, tail1    ]   # tail1 yaw
      - [pos_ang, 0, tail1    ]   # tail_twist pitch (also belongs to body=tail1)
      - [pos_ang, 0, tail2    ]   # tail2 yaw
      - [pos_ang, 0, finright ]   # finright_roll
      - [pos_ang, 0, finright ]   # finright_pitch
      - [pos_ang, 0, finleft  ]   # finleft_roll
      - [pos_ang, 0, finleft  ]   # finleft_pitch

      # -- upright (1) --------------------
      # Fish uprightness (e.g. alignment between the torso z-axis and the world z-axis, computed as a scalar by the environment)
      - [upright, 0, torso]

      # --- target (3) -- exposed only in FishSwim ----------------------------------------
      # World-coordinate components of the target ball (x, y, z)
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]
      - [pos_lin, 1, target]

      # -- velocity (13) -------------------
      # root (torso), 6 dims: linear velocity (3) + angular velocity (3)
      - [v_lin, 0, torso]      # vx
      - [v_lin, 0, torso]      # vy
      - [v_lin, 0, torso]      # vz
      - [v_ang, 0, torso]      # ωx
      - [v_ang, 0, torso]      # ωy
      - [v_ang, 0, torso]      # ωz
      # 7 joint angular velocities (in the same order as the joint_angles above)
      - [v_jnt, 0, tail1   ]   # tail1̇
      - [v_jnt, 0, tail1   ]   # tail_twisṫ
      - [v_jnt, 0, tail2   ]   # tail2̇
      - [v_jnt, 0, finright]   # finright_roll̇
      - [v_jnt, 0, finright]   # finright_pitcḣ
      - [v_jnt, 0, finleft ]   # finleft_roll̇
      - [v_jnt, 0, finleft ]   # finleft_pitcḣ
